<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTodo — Reset Password</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

    <link rel="stylesheet" href="forgot.css">
</head>

<body>


    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>
    <div class="bg-glow glow-3"></div>

    <div class="container">

        <div class="brand-section">
            <div class="logo-icon">
                <i class="fa-solid fa-key"></i>
            </div>
            <h1>Recover Password</h1>
            <p>Enter your verified email address below and we'll send you an link to reset your password vault.</p>
        </div>


        <div class="glass-card">
            <form id="forgotForm" class="auth-form active" autocomplete="off">

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input type="email" id="email" placeholder="name@domain.com" required>
                    </div>
                </div>


                <button type="submit" id="resetBtn" class="btn-primary">
                    <span>Send Reset Link</span>
                    <i class="fa-solid fa-paper-plane"></i>
                </button>

            </form>


            <div class="card-footer">
                <p style="margin-top: 10px;">
                    <a href="index.html" class="forgot-link"
                        style="display: inline-flex; align-items: center; gap: 6px;">
                        <i class="fa-solid fa-arrow-left" style="font-size: 11px;"></i> Back to Login Portal
                    </a>
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="forgot.js"></script>
</body>

</html>
