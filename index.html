<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTodo - Login & Signup</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
</head>

<body>

    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>
    <div class="bg-glow glow-3"></div>

    <div class="container">
        <div class="brand-section">
            <div class="logo-icon">
                <i class="fa-solid fa-layer-group"></i>
            </div>
            <h1>ProTodo</h1>
            <p>Your Ultimate Premium Task Manager</p>
        </div>

        <div class="glass-card">

            <div class="tab-control">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <form id="loginForm" class="auth-form active">
                <div class="input-group">
                    <label for="loginEmail">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope input-icon"></i>
                        <input type="email" id="loginEmail" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="loginPassword">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="loginPassword" placeholder="Enter your password" required>
                    </div>
                </div>

                <div class="form-actions">
                    <label class="remember-me">
                        <input type="checkbox"> <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-primary" id="Login-to-Dashboard">
                    <span>Login to Dashboard</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>








            <form id="signupForm" class="auth-form">
                <div class="input-group">
                    <label for="newName">Full Name</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user input-icon"></i>
                        <input type="text" id="newName" placeholder="Enter your full name">
                    </div>
                </div>

                <div class="input-group">
                    <label for="signupEmail">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope input-icon"></i>
                        <input type="email" id="signupEmail" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="signupPassword">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="signupPassword" placeholder="Create strong password" required>
                    </div>
                </div>

                <div class="form-actions">
                    <label class="remember-me">
                        <input type="checkbox" required> <span>I agree to Terms & Conditions</span>
                    </label>
                </div>

                <button type="submit" class="btn-primary" id="createAccount">
                    <span>Create Free Account</span>
                    <i class="fa-solid fa-user-plus"></i>
                </button>
            </form>

            <div class="divider">
                <span>or continue with</span>
            </div>

            <div class="social-login">
                <button class="btn-social google" id="google-login">
                    <img src="images/google-icon.svg" alt="Google">
                    <span>Google</span>
                </button>
                <button class="btn-social github" id="github-login">
                    <!-- <i class="fa-brands fa-github"></i> -->
                    <img src="images/github-svgrepo-com.svg" alt="GitHub">
                    <span>GitHub</span>
                </button>
            </div>

            <div class="card-footer">
                <p>Secured by end-to-end encryption. <br> By continuing, you agree to ProTodo's premium user terms.</p>
            </div>
        </div>
    </div>




    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
        function switchTab(type) {
            const tabs = document.querySelectorAll('.tab-btn');
            const forms = document.querySelectorAll('.auth-form');

            tabs.forEach(tab => tab.classList.remove('active'));
            forms.forEach(form => form.classList.remove('active'));

            if (type === 'login') {
                tabs[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                tabs[1].classList.add('active');
                document.getElementById('signupForm').classList.add('active');
            }
        }
    </script>
</body>

</html>
