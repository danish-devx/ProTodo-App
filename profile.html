<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTodo — Account Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

    <link rel="stylesheet" href="profile.css">
</head>

<body>

    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>
    <div class="bg-glow glow-3"></div>

    <div class="container">


        <div class="brand-section">
            <div class="logo-icon">
                <i class="fa-solid fa-user-gear"></i>
            </div>
            <h1>Account Profile</h1>
            <p>View, customize, and update your personal credentials and premium identifier variables inside the ProTodo
                network.</p>
        </div>

        <div class="glass-card">

            <div class="profile-media-block">
                <div class="avatar-container">
                    <img src="images/file_00000000161c720885506c38d76251b9.png" alt="User Avatar" class="user-pic"
                        id="avatar-display">
                    <label for="avatar-input" class="cam-badge">
                        <i class="fa-solid fa-camera"></i>
                    </label>
                    <input type="file" id="avatar-input" accept="image/*" style="display: none;">
                </div>
                <h2 id="title-name">-- ----</h2>
                <p id="title-email">------</p>
            </div>

            <form id="profileForm" onsubmit="event.preventDefault();">

                <div class="input-group">
                    <label for="profileName">Full Name</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user input-icon"></i>
                        <input type="text" id="profileName" placeholder="Enter your full name" disabled required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="profileEmail">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope input-icon"></i>
                        <input type="email" id="profileEmail" placeholder="Enter your email address" disabled required>
                    </div>
                </div>

                <div style="margin-top: 25px; display: flex; flex-direction: column; gap: 10px;">
                    <button type="button" class="btn-primary" id="edit-toggle-btn">
                        <i class="fa-solid fa-pen-to-square"></i>
                        <span id="btn-label">Edit Profile</span>
                    </button>

                    <button type="button" class="btn-secondary" id="discard-btn" style="display: none;">
                        Discard Changes
                    </button>
                </div>

            </form>


            <div class="card-footer">
                <p style="margin-top: 10px;">
                    <a href="todo.html" class="forgot-link">
                        <i class="fa-solid fa-arrow-left" style="font-size: 11px;"></i> Back to Dashboard
                    </a>
                </p>
            </div>

        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="profile.js"></script>
</body>

</html>
