    <div class="dashboard-wrapper">


        <aside class="sidebar-form">
            <div class="form-header">
                <i class="fa-solid fa-square-plus form-title-icon"></i>
                <h2>Create New Task</h2>
            </div>

            <form class="task-creation-form">
                <div class="input-group">
                    <label for="taskTitle">Task Title</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-pen-to-square input-icon"></i>
                        <input type="text" id="taskTitle" placeholder="What needs to be done?" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="taskCategory">Category</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-tag input-icon"></i>
                        <select id="taskCategory" required>
                            <option value="" disabled selected>Select priority layer</option>
                            <option value="work">Work Project</option>
                            <option value="personal">Personal Task</option>
                            <option value="urgent">Urgent Priority</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label for="taskDesc">Task Description</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-file-lines textarea-icon"></i>
                        <textarea id="taskDesc" rows="5" placeholder="Add custom notes or brief context..."></textarea>
                    </div>
                </div>

                <button type="submit" class="btn-submit-task" id="add-btn">
                    <span>Add Task to Board</span>
                    <i class="fa-solid fa-plus"></i>
                </button>
            </form>
        </aside>

                <div class="total-tasks-box">

                    <div class="counter-label">Total Tasks</div>
                </div>
            </div>
