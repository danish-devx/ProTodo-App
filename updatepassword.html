<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTodo — Create New Password</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

    <link rel="stylesheet" href="updatepassword.css">
</head>

<body>


    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>
    <div class="bg-glow glow-3"></div>

    <div class="container">

        <div class="brand-section">
            <div class="logo-icon">
                <i class="fa-solid fa-lock-open"></i>
            </div>
            <h1>Secure New Password</h1>
            <p>Please orchestrate a strong, complex password vault below to re-authorize your entry profile.</p>
        </div>


        <div class="glass-card">
            <form id="updatePasswordForm" class="auth-form active" autocomplete="off">


                <div class="input-group">
                    <label for="newPassword">New Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="newPassword" placeholder="••••••••" minlength="6" required>
                    </div>
                </div>


                <div class="input-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-shield-check input-icon"></i>
                        <input type="password" id="confirmPassword" placeholder="••••••••" minlength="6" required>
                    </div>
                </div>


                <button type="submit" id="updateBtn" class="btn-primary">
                    <span>Update Security Vault</span>
                    <i class="fa-solid fa-circle-check"></i>
                </button>

            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="updatepassword.js"></script>
</body>

</html>
